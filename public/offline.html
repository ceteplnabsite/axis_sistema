<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sem conexão – Áxis</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0F172A;
      color: #E2E8F0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 2rem;
      text-align: center;
    }

    .icon {
      width: 96px;
      height: 96px;
      margin-bottom: 2rem;
      opacity: 0.9;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      color: #F8FAFC;
      margin-bottom: 0.75rem;
    }

    p {
      font-size: 1rem;
      color: #94A3B8;
      max-width: 360px;
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: #1E293B;
      border: 1px solid #334155;
      border-radius: 9999px;
      padding: 0.5rem 1.25rem;
      font-size: 0.875rem;
      color: #64748B;
      margin-bottom: 2.5rem;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #EF4444;
      animation: pulse 2s infinite;
    }

    button {
      background: #3B82F6;
      color: white;
      border: none;
      border-radius: 0.75rem;
      padding: 0.875rem 2rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    button:hover { background: #2563EB; }
    button:active { transform: scale(0.97); }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
  </style>
</head>
<body>
  <img src="/icon-192x192.png" alt="Áxis" class="icon" />
  <h1>Sem conexão com a internet</h1>
  <p>
    O Áxis precisa de conexão para carregar os dados mais recentes.
    Verifique sua rede e tente novamente.
  </p>
  <div class="badge">
    <span class="dot"></span>
    Offline
  </div>
  <button onclick="window.location.reload()">
    Tentar novamente
  </button>
</body>
</html>
